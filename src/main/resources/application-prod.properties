# 本番環境設定（spring.profiles.active=prod で有効化）

# SQLite — サーバー上の固定パスに保存
spring.datasource.url=jdbc:sqlite:/opt/otetsudai/data/otetsudai.db

# Nginx リバースプロキシ経由の場合、X-Forwarded-Proto を信頼して HTTPS と認識させる
server.forward-headers-strategy=native

# ログ
logging.file.name=/opt/otetsudai/logs/app.log
logging.level.root=WARN
logging.level.design.hitsuji=INFO

# Jasypt 暗号化設定
# マスターキーは環境変数 JASYPT_ENCRYPTOR_PASSWORD で指定する（ファイルに書かない）
jasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD}

# メール設定
# パスワードは ENC(...) 形式で暗号化済みの値を設定する
# 暗号化コマンド（PowerShell / コマンドプロンプト共通）:
#   各 -D 引数全体をダブルクォートで囲むこと（値だけを囲まない）
#
#   "C:\tools\apache-maven-3.9.14\bin\mvn.cmd" jasypt:encrypt-value ^
#     "-Djasypt.encryptor.password=マスターキー" ^
#     "-Djasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256" ^
#     "-Djasypt.plugin.value=SMTPパスワード"
#
#   出力の ENC(...) をそのまま下の spring.mail.password に設定する
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=ENC(Aa6UW4cWTXcwj3UyfHp2Pkudc0sqfQOegMWdxz63vlm7Hv0cryGe7WSCweAAe1Nm)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
