spring.application.name=otetsudai

# SQLite データソース
spring.datasource.url=jdbc:sqlite:./app-data/otetsudai.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false

# セキュリティ: スタックトレースをレスポンスに含めない
server.error.include-stacktrace=never
server.error.include-message=never

# メール設定（開発用: 実際のSMTPなしで起動可能）
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=noreply@otetsudai.local
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Jasypt: 開発環境ではダミーキーを設定（ENC() を使う値がないため実質無効）
jasypt.encryptor.password=dev-dummy-key
