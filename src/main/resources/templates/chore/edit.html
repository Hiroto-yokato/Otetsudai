<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('お手伝い編集')}"></head>
<body>

<div th:replace="~{fragments/layout :: nav}"></div>

<main class="main-content">
    <div class="container">

        <div class="page-header">
            <h1 class="page-title">お手伝いを編集する</h1>
        </div>

        <div class="form-card">
            <form th:action="@{/chores/{id}/edit(id=${choreId})}" method="post" th:object="${choreForm}">

                <div class="form-group">
                    <label for="choreDate">日付</label>
                    <input type="date"
                           id="choreDate"
                           th:field="*{choreDate}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('choreDate')} ? 'is-invalid'">
                    <div th:if="${#fields.hasErrors('choreDate')}" class="field-error">
                        <span th:errors="*{choreDate}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">お手伝いの内容</label>
                    <input type="text"
                           id="content"
                           th:field="*{content}"
                           list="choreTemplates"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"
                           placeholder="選択または自由入力">
                    <datalist id="choreTemplates">
                        <option th:each="t : ${choreTemplates}" th:value="${t}"></option>
                    </datalist>
                    <div th:if="${#fields.hasErrors('content')}" class="field-error">
                        <span th:errors="*{content}"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存する</button>
                    <a th:href="@{/chores}" class="btn btn-secondary">キャンセル</a>
                </div>

            </form>
        </div>

    </div>
</main>

</body>
</html>
