<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('アカウント登録')}"></head>
<body class="login-page">

<div class="login-container">
    <div class="login-card">
        <h1 class="login-title">🏠 お手伝いポイント管理</h1>
        <p class="login-subtitle">親アカウントを作成してください</p>

        <!-- エラーメッセージ -->
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${form}" class="login-form">

            <div class="form-group">
                <label for="userId">ユーザーID <span class="required">必須</span></label>
                <input type="text"
                       id="userId"
                       th:field="*{userId}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('userId')} ? 'is-invalid'"
                       placeholder="3〜20文字、英数字・アンダースコアのみ"
                       autocomplete="username">
                <div th:if="${#fields.hasErrors('userId')}" class="field-error">
                    <span th:errors="*{userId}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">メールアドレス <span class="required">必須</span></label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="example@mail.com"
                       autocomplete="email">
                <div th:if="${#fields.hasErrors('email')}" class="field-error">
                    <span th:errors="*{email}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="displayName">表示名 <span class="optional">任意</span></label>
                <input type="text"
                       id="displayName"
                       th:field="*{displayName}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('displayName')} ? 'is-invalid'"
                       placeholder="50文字以内">
                <div th:if="${#fields.hasErrors('displayName')}" class="field-error">
                    <span th:errors="*{displayName}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">パスワード <span class="required">必須</span></label>
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       placeholder="8文字以上"
                       autocomplete="new-password">
                <div th:if="${#fields.hasErrors('password')}" class="field-error">
                    <span th:errors="*{password}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">パスワード（確認） <span class="required">必須</span></label>
                <input type="password"
                       id="passwordConfirm"
                       th:field="*{passwordConfirm}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                       placeholder="もう一度入力してください"
                       autocomplete="new-password">
                <div th:if="${#fields.hasErrors('passwordConfirm')}" class="field-error">
                    <span th:errors="*{passwordConfirm}"></span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">アカウントを作成する</button>
        </form>

        <div class="register-link">
            <a th:href="@{/login}">ログインに戻る</a>
        </div>
    </div>
</div>

</body>
</html>
