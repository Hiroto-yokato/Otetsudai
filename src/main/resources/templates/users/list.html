<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('子どもアカウント一覧')}"></head>
<body>

<div th:replace="~{fragments/layout :: nav}"></div>

<main class="main-content">
    <div class="container">

        <!-- 登録完了バナー -->
        <div th:if="${param.registered}" class="approval-success-banner">
            <span>✓</span>
            子どものアカウントを登録しました
        </div>

        <div class="page-header">
            <h1 class="page-title">子どもアカウント一覧</h1>
            <a th:href="@{/users/new}" class="btn btn-primary">+ 子どもを追加する</a>
        </div>

        <!-- 子どもがいない場合 -->
        <div th:if="${#lists.isEmpty(children)}" class="empty-state">
            <p>まだ子どものアカウントが登録されていません。</p>
            <p>「子どもを追加する」ボタンからアカウントを作成しましょう！</p>
        </div>

        <!-- 子ども一覧 -->
        <div th:if="${!#lists.isEmpty(children)}" class="approval-table-wrapper">
            <table class="approval-table">
                <thead>
                    <tr>
                        <th>ユーザーID</th>
                        <th>表示名</th>
                        <th>登録日</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="child : ${children}">
                        <td th:text="${child.userId}"></td>
                        <td th:text="${child.displayName != null ? child.displayName : '-'}"></td>
                        <td th:text="${#temporals.format(child.createdAt, 'yyyy年M月d日')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>

</body>
</html>
