<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('子どもアカウント登録')}"></head>
<body>

<div th:replace="~{fragments/layout :: nav}"></div>

<main class="main-content">
    <div class="container">

        <div class="page-header">
            <h1 class="page-title">子どものアカウントを登録する</h1>
        </div>

        <!-- サービス層エラー -->
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <div class="form-card">
            <form th:action="@{/users}" method="post" th:object="${form}">

                <div class="form-group">
                    <label for="userId">ユーザーID <span class="required">必須</span></label>
                    <input type="text"
                           id="userId"
                           th:field="*{userId}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('userId')} ? 'is-invalid'"
                           placeholder="3〜20文字、英数字・アンダースコアのみ">
                    <div th:if="${#fields.hasErrors('userId')}" class="field-error">
                        <span th:errors="*{userId}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">パスワード <span class="required">必須</span></label>
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           placeholder="8文字以上">
                    <div th:if="${#fields.hasErrors('password')}" class="field-error">
                        <span th:errors="*{password}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="passwordConfirm">パスワード（確認） <span class="required">必須</span></label>
                    <input type="password"
                           id="passwordConfirm"
                           th:field="*{passwordConfirm}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                           placeholder="もう一度入力してください">
                    <div th:if="${#fields.hasErrors('passwordConfirm')}" class="field-error">
                        <span th:errors="*{passwordConfirm}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス <span class="optional">任意</span></label>
                    <input type="email"
                           id="email"
                           th:field="*{email}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           placeholder="example@mail.com">
                    <div th:if="${#fields.hasErrors('email')}" class="field-error">
                        <span th:errors="*{email}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="displayName">表示名 <span class="optional">任意</span></label>
                    <input type="text"
                           id="displayName"
                           th:field="*{displayName}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('displayName')} ? 'is-invalid'"
                           placeholder="50文字以内">
                    <div th:if="${#fields.hasErrors('displayName')}" class="field-error">
                        <span th:errors="*{displayName}"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">登録する</button>
                    <a th:href="@{/users}" class="btn btn-secondary">キャンセル</a>
                </div>

            </form>
        </div>

    </div>
</main>

</body>
</html>
