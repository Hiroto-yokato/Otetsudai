# /etc/nginx/sites-available/otetsudai
# setup.sh によって自動的に配置される

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name hitsuji-design.work;
    return 301 https://$host$request_uri;
}

# HTTPS（Let's Encrypt 証明書は certbot が生成）
server {
    listen 443 ssl;
    server_name hitsuji-design.work;

    ssl_certificate     /etc/letsencrypt/live/hitsuji-design.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hitsuji-design.work/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # セキュリティヘッダー
    add_header X-Frame-Options          DENY;
    add_header X-Content-Type-Options   nosniff;
    add_header Referrer-Policy          strict-origin-when-cross-origin;

    # Spring Boot へのリバースプロキシ
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 静的ファイルをブラウザにキャッシュさせる
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header       Cache-Control "public, max-age=86400";
        expires          1d;
    }
}
